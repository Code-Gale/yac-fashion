services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/yac-fashion
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
    depends_on:
      - mongodb
      - redis
      - minio
    restart: unless-stopped
    networks:
      - yac-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Override repo .env PORT (e.g. 4100 for local); nginx + publish expect 3000
      - PORT=3000
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:4000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - yac-network

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - yac-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - yac-network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - yac-network

networks:
  yac-network:
    driver: bridge

volumes:
  mongodb_data:
  minio_data:
